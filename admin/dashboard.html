<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | El Royale Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>El Royale</h2>
        <p>Admin Panel</p>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active"><span>📊</span> Dashboard</a>
        <a href="students.html" class="nav-item"><span>👥</span> Students</a>
        <a href="progress.html" class="nav-item"><span>📈</span> Progress</a>
        <a href="challenges.html" class="nav-item"><span>🧩</span> Challenges</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <h1 class="page-title">Dashboard</h1>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Students</h3>
          <div class="stat-value" id="total-students">—</div>
        </div>
        <div class="stat-card">
          <h3>Active Students</h3>
          <div class="stat-value" id="active-students">—</div>
        </div>
        <div class="stat-card">
          <h3>Challenges Completed</h3>
          <div class="stat-value" id="total-progress">—</div>
        </div>

      </div>

      <!-- Recent Students -->
      <div class="table-card">
        <div class="table-card-header">Recently Registered Students</div>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Status</th>
              <th>Registered</th>
            </tr>
          </thead>
          <tbody id="recent-students">
            <tr><td colspan="4" style="text-align:center; color:#64748b;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

  </div>

  <script src="js/dashboard.js"></script>
<script>
  requireAuth();

  const loadDashboard = async () => {
    try {
      const [usersRes, progressRes, resultsRes] = await Promise.all([
        authFetch(`${API}/users`),
        authFetch(`${API}/progress`),
        authFetch(`${API}/results`)
      ]);

      const users = await usersRes.json();
      const progress = await progressRes.json();
      const results = await resultsRes.json();

      document.getElementById('total-students').textContent = users.length;
      document.getElementById('active-students').textContent = users.filter(u => u.isActive).length;
      document.getElementById('total-progress').textContent = progress.filter(p => p.completed).length;
      document.getElementById('total-quizzes').textContent = results.length;

      const recent = [...users].reverse().slice(0, 5);
      const tbody = document.getElementById('recent-students');

      if (recent.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">No students registered yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = recent.map(user => `
        <tr>
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>
            <span class="badge ${user.isActive ? 'badge-success' : 'badge-danger'}">
              ${user.isActive ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td>${new Date(user.createdAt).toLocaleDateString()}</td>
        </tr>
      `).join('');

    } catch (err) {
      console.error('Dashboard load error:', err);
    }
  };

  loadDashboard();
</script>
</body>
</html>
